name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        version: "latest"
    
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: uv sync
    
    - name: Check Python syntax
      run: uv run python -m py_compile src/coding_dataset_preprocess/__init__.py
    
    - name: Test application runs
      run: uv run coding-dataset-preprocess
    
    - name: Verify package installation
      run: uv run python -c "import coding_dataset_preprocess; coding_dataset_preprocess.main()"
